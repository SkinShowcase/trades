spring:
  application:
    name: trades
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/trades;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8083}

# Клиент steam-gateway: проверка инвентаря пользователя (принадлежат ли выбранные предметы пользователю).
steam-gateway:
  base-url: ${STEAM_GATEWAY_BASE_URL:http://localhost:8080}
  connect-timeout-ms: 5000
  read-timeout-ms: 30000

# Клиент items: обогащение выбранных предметов (название, цена, скриншот).
items:
  base-url: ${ITEMS_BASE_URL:http://localhost:8081}
  connect-timeout-ms: 3000
  read-timeout-ms: 10000

# Клиент auth: приватность профиля (витрина / лента). Тот же ключ, что auth.internal.service-key.
auth-service:
  base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}
  connect-timeout-ms: 3000
  read-timeout-ms: 10000
  internal-service-key: ${AUTH_INTERNAL_SERVICE_KEY:}

# Observability
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    com.skinsshowcase: DEBUG
    org.springframework.web: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

---
# Тот же секрет, что в auth / messaging (HS256, минимум 32 байта).
app:
  auth:
    jwt:
      secret: ${AUTH_JWT_SECRET:local-dev-secret-at-least-32-bytes-long-for-hs256}
  steam-id-protection:
    key: ${TRADES_STEAM_ID_CRYPTO_KEY:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
